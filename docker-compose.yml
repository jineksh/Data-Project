version: "3.9"

services:
  spark-master:
    image: apache/spark:3.5.1
    container_name: spark-master

    command: >
      /opt/spark/bin/spark-class
      org.apache.spark.deploy.master.Master

    ports:
      - "7077:7077"
      - "8080:8080"

    volumes:
      - ./jobs:/opt/spark/jobs
      - ./data:/opt/spark/data

    networks:
      - spark-network

  spark-worker:
    image: apache/spark:3.5.1
    container_name: spark-worker

    depends_on:
      - spark-master

    command: >
      /opt/spark/bin/spark-class
      org.apache.spark.deploy.worker.Worker
      spark://spark-master:7077

    volumes:
      - ./jobs:/opt/spark/jobs
      - ./data:/opt/spark/data

    ports:
      - "8081:8081"

    networks:
      - spark-network

networks:
  spark-network: